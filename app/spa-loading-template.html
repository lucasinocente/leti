<div id="bjj-loading-overlay" class="bjj-overlay">
  <div class="bjj-page">
    <div class="bjj-header">
      <div class="bjj-block bjj-round"></div>
      <div class="bjj-block bjj-menu"></div>
    </div>

    <div class="bjj-timer">
      <div class="bjj-row">
        <div class="bjj-block bjj-btn"></div>
        <div class="bjj-block bjj-btn"></div>
      </div>
      <div class="bjj-block bjj-digits"></div>
      <div class="bjj-row">
        <div class="bjj-block bjj-btn"></div>
        <div class="bjj-block bjj-btn"></div>
      </div>
    </div>

    <div class="bjj-actions">
      <div class="bjj-block bjj-play"></div>
    </div>
  </div>
</div>

<style>
  .bjj-overlay {
    position: fixed;
    inset: 0;
    display: flex;
    justify-content: center;
    background: #261029;
  }
  .bjj-page {
    width: 100%;
    max-width: 384px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-between;
    padding: 40px 24px;
    box-sizing: border-box;
  }
  .bjj-header {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .bjj-timer {
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
  }
  .bjj-row {
    width: 100%;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }
  .bjj-actions {
    width: 100%;
  }
  .bjj-block {
    background: rgba(255, 255, 255, 0.12);
    border-radius: 12px;
    animation: bjj-pulse 1.5s ease-in-out infinite;
  }
  .bjj-overlay.bjj-light .bjj-block {
    background: rgba(0, 0, 0, 0.08);
  }
  .bjj-round {
    width: 160px;
    height: 32px;
    border-radius: 8px;
  }
  .bjj-menu {
    width: 40px;
    height: 40px;
  }
  .bjj-btn {
    height: 56px;
  }
  .bjj-digits {
    width: 100%;
    height: 112px;
  }
  .bjj-play {
    width: 100%;
    height: 64px;
  }

  @keyframes bjj-pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }
</style>

<script>
  (function () {
    var beltColors = { white: '#ffffff', blue: '#002438', purple: '#261029', brown: '#26170a', black: '#09090b' }
    var mode = 'purple'
    try {
      var saved = JSON.parse(localStorage.getItem('bjj-timer-settings') || '{}')
      if (saved && beltColors[saved.colorMode]) mode = saved.colorMode
    } catch (e) {}

    var overlay = document.getElementById('bjj-loading-overlay')
    overlay.style.background = beltColors[mode]
    if (mode === 'white') overlay.classList.add('bjj-light')
  })()
</script>
